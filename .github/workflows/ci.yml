name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # CI sur ubuntu n'a pas DNF : on installe Flask/Pydantic via pip.
        # (En production sur Fedora, le launcher cree un venv jetable + pip.)
        run: |
          python -m pip install --upgrade pip
          pip install flask pydantic pytest ruff

      - name: Compile all sources
        run: python -m compileall -q routes scripts utils schemas web_app.py fedora_kde_forge.py

      - name: Ruff (lint)
        run: ruff check .

      - name: Pytest
        run: pytest tests/ -q

      - name: Bash syntax (-n) sur les scripts
        run: |
          for f in fedoraforgeKDE.sh start.sh packaging/install-desktop.sh tools/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: Validation JSON (configs)
        run: |
          python - <<'PY'
          import glob, json, sys
          n = 0
          for f in glob.glob("configs/**/*.json", recursive=True):
              try:
                  json.load(open(f))
                  n += 1
              except Exception as e:
                  print(f"JSON invalide: {f}: {e}", file=sys.stderr)
                  sys.exit(1)
          print(f"{n} fichiers JSON valides")
          PY
